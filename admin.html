<body>
  <div class="container">
    <div class="header">
      <h1><i class="fas fa-store"></i> Keting Store Admin</h1>
      <p>Manage your products quickly and easily</p>
    </div>
    
    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-number" id="totalProducts">0</div>
        <div class="stat-label">Products</div>
      </div>

        <div class="stat-number" id="avgPrice">RM0</div>
        <div class="stat-label">Avg Price</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="lastUpdated">-</div>
        <div class="stat-label">Last Updated</div>
      </div>
    </div>
    
    <div class="actions">

      </button>

        <i class="fas fa-download"></i> Export JSON
      </button>
      <button class="btn btn-success" onclick="saveAllChanges()">
        <i class="fas fa-save"></i> Save All
      </button>
    </div>
    
    <div class="products-list">

        <!-- Products will be loaded here -->
      </div>

  </div>
  
  <!-- Add/Edit Modal -->

          <i class="fas fa-times"></i>
        </button>
      </div>
      
      <form id="productForm">
        <div class="form-grid">
          <div class="form-group full-width">
            <label>Product Title</label>
            <input type="text" id="formTitle" placeholder="e.g., Sampul Raya Cute 2026" required>
          </div>
          
          <div class="form-group">
            <label>Price (RM)</label>
            <input type="number" id="formPrice" placeholder="1.98" step="0.01" class="price-input" required>
          </div>
          
          <div class="form-group">
            <label>Discount</label>

          </div>
          
          <div class="form-group">
            <label>Rating</label>

          </div>

            <label>Badge 1</label>
            <input type="text" id="formBadge1" placeholder="e.g., Best Seller">
          </div>
          
          <div class="form-group">
            <label>Badge 2</label>
            <input type="text" id="formBadge2" placeholder="e.g., Free Shipping">
          </div>
        </div>
        
        <div class="modal-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save Product</button>
        </div>
      </form>
    </div>
  </div>
  
  <div class="toast" id="toast">
    <i class="fas fa-check-circle"></i>
    <span id="toastMessage">Operation successful</span>
  </div>

  <script>
    let products = [];
    let editingIndex = -1;
    
    // Load products from items.json
    async function loadProducts() {
      try {
        const response = await fetch('items.json');
        if (!response.ok) throw new Error('Failed to load');
        products = await response.json();
        renderProducts();
        updateStats();
      } catch (error) {
        showToast('Error loading products', 'error');
        console.error(error);
      }
    }
    
    function renderProducts() {
      const container = document.getElementById('productsContainer');
      
      if (products.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fas fa-box-open"></i>
            <p>No products yet. Click "Add Product" to get started!</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = products.map((product, index) => `
        <div class="product-item" data-index="${index}">
          <div class="product-header">
            <img src="${product.image || 'https://via.placeholder.com/60'}" alt="" class="product-img" onerror="this.src='https://via.placeholder.com/60'">
            <div class="product-title-row">
              <div class="product-title">${product.title || 'Untitled'}</div>
              <a href="${product.link || '#'}" target="_blank" class="product-link">
                <i class="fas fa-external-link-alt"></i> View on Shopee
              </a>
            </div>
            <button class="delete-btn" onclick="deleteProduct(${index})" title="Delete">
              <i class="fas fa-trash"></i>
            </button>
          </div>
          
          <div class="form-grid">
            <div class="form-group">
              <label>Price (RM)</label>
              <input type="number" value="${product.price || ''}" 
                     onchange="updateProduct(${index}, 'price', this.value)" 
                     class="price-input" step="0.01">
            </div>
            
            <div class="form-group">
              <label>Discount</label>
              <input type="text" value="${product.discount || ''}" 
                     onchange="updateProduct(${index}, 'discount', this.value)">
            </div>
            
            <div class="form-group">
              <label>Rating</label>
              <input type="number" value="${product.rating || ''}" 
                     onchange="updateProduct(${index}, 'rating', this.value)" 
                     step="0.1" min="0" max="5">
            </div>
            
            <div class="form-group">
              <label>Sold</label>
              <input type="text" value="${product.sold || ''}" 
                     onchange="updateProduct(${index}, 'sold', this.value)">
            </div>
            
            <div class="form-group full-width">
              <label>Promo</label>
              <input type="text" value="${product.promo || ''}" 
                     onchange="updateProduct(${index}, 'promo', this.value)">
            </div>
          </div>
        </div>
      `).join('');
    }
    
    function updateStats() {
      document.getElementById('totalProducts').textContent = products.length;
      
      if (products.length > 0) {
        const avg = products.reduce((sum, p) => sum + (parseFloat(p.price) || 0), 0) / products.length;
        document.getElementById('avgPrice').textContent = 'RM' + avg.toFixed(2);
      } else {
        document.getElementById('avgPrice').textContent = 'RM0';
      }
      
      const now = new Date();
      document.getElementById('lastUpdated').textContent = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    }
    
    function updateProduct(index, field, value) {
      if (field === 'price' || field === 'rating') {
        products[index][field] = parseFloat(value) || 0;
      } else {
        products[index][field] = value;
      }
      updateStats();
    }
    
    function deleteProduct(index) {
      if (confirm('Are you sure you want to delete this product?')) {
        products.splice(index, 1);
        renderProducts();
        updateStats();
        showToast('Product deleted');
      }
    }
    
    function openAddModal() {
      editingIndex = -1;
      document.getElementById('modalTitle').textContent = 'Add New Product';
      document.getElementById('productForm').reset();
      document.getElementById('productModal').classList.add('active');
    }
    
    function closeModal() {
      document.getElementById('productModal').classList.remove('active');
    }
    
    document.getElementById('productForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const newProduct = {
        title: document.getElementById('formTitle').value,
        price: parseFloat(document.getElementById('formPrice').value) || 0,
        discount: document.getElementById('formDiscount').value,
        rating: parseFloat(document.getElementById('formRating').value) || 0,
        sold: document.getElementById('formSold').value,
        promo: document.getElementById('formPromo').value,
        image: document.getElementById('formImage').value,
        link: document.getElementById('formLink').value,
        badge1: document.getElementById('formBadge1').value,
        badge2: document.getElementById('formBadge2').value,
        order: products.length + 1
      };
      
      products.push(newProduct);
      renderProducts();
      updateStats();
      closeModal();
      showToast('Product added successfully');
    });
    
    function downloadJSON() {
      const dataStr = JSON.stringify(products, null, 2);
      const blob = new Blob([dataStr], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'items.json';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('JSON file downloaded!');
    }
    
    function saveAllChanges() {
      // In a real scenario, you'd send this to a server
      // For GitHub Pages, we download the file
      downloadJSON();
      showToast('All changes saved! Replace items.json in your repository.');
    }
    
    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      document.getElementById('toastMessage').textContent = message;
      toast.className = 'toast show ' + type;
      
      setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }
    
    // Close modal on outside click
    document.getElementById('productModal').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });
    
    // Load products on startup
    loadProducts();
  </script>
</body>
</html>'''
