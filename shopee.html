<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shopee Cart | Keting Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(180deg, #fff7f3 0%, #f7f7f8 100%);
      color: #222;
      min-height: 100vh;
    }

    .page {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      background: #f6f6f6;
      box-shadow: 0 0 30px rgba(0,0,0,0.06);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(255,255,255,0.94);
      backdrop-filter: blur(8px);
      padding: 14px 14px 10px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .search-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .back-btn {
      text-decoration: none;
      color: #ee4d2d;
      font-size: 1.6rem;
      line-height: 1;
      font-weight: 500;
      flex-shrink: 0;
    }

    .search-box {
      flex: 1;
      border: 2px solid #ee4d2d;
      border-radius: 14px;
      min-height: 52px;
      display: flex;
      align-items: center;
      background: #fff;
      padding: 0 14px;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      font-size: 0.98rem;
      font-family: inherit;
      background: transparent;
      color: #222;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      background: #fff;
      margin-top: 10px;
      border-top: 1px solid #f0f0f0;
    }

    .tab {
      text-align: center;
      font-size: 0.92rem;
      color: #666;
      padding: 12px 4px 10px;
      border-bottom: 3px solid transparent;
      cursor: pointer;
      user-select: none;
    }

    .tab.active {
      color: #ee4d2d;
      border-bottom-color: #ee4d2d;
      font-weight: 600;
    }

    .products {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 14px 20px;
    }

    .product-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: #fff;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 3px 12px rgba(0,0,0,0.06);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .product-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 22px rgba(0,0,0,0.10);
    }

    .product-image-wrap {
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .product-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-body {
      padding: 10px 10px 12px;
    }

    .badge-row {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .badge {
      font-size: 0.65rem;
      line-height: 1;
      padding: 4px 6px;
      border-radius: 4px;
      font-weight: 600;
    }

    .badge.red {
      background: #ee4d2d;
      color: #fff;
    }

    .badge.orange {
      background: #fff1eb;
      color: #ee4d2d;
      border: 1px solid #ffd4c8;
    }

    .product-title {
      font-size: 0.95rem;
      line-height: 1.35;
      min-height: 2.6em;
      overflow: hidden;
      margin-bottom: 8px;
      color: #333;
    }

    .price-row {
      display: flex;
      align-items: baseline;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 6px;
    }

    .price {
      font-size: 1.1rem;
      color: #ee4d2d;
      font-weight: 600;
    }

    .discount {
      font-size: 0.8rem;
      color: #ee4d2d;
      background: #fff1eb;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .promo {
      display: inline-block;
      font-size: 0.72rem;
      color: #ee4d2d;
      background: #fff1eb;
      border: 1px solid #ffd4c8;
      padding: 4px 6px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .meta-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
      color: #777;
    }

    .rating {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      color: #f5a623;
      font-weight: 600;
    }

    .sold {
      color: #666;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 24px 12px;
      color: #888;
      font-size: 0.95rem;
    }

    @media (max-width: 380px) {
      .product-title {
        font-size: 0.88rem;
      }

      .price {
        font-size: 1rem;
      }

      .tab {
        font-size: 0.84rem;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="search-row">
        <a href="index.html" class="back-btn">←</a>
        <div class="search-box">
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search product name"
          />
        </div>
      </div>

      <div class="tabs">
        <div class="tab active" data-sort="relevance">Relevance</div>
        <div class="tab" data-sort="latest">Latest</div>
        <div class="tab" data-sort="topSales">Top Sales</div>
        <div class="tab" data-sort="price">Price</div>
      </div>
    </div>

    <div class="products" id="products"></div>
  </div>

  <script src="shopee.js"></script>
</body>
</html>
