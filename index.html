<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keting Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.18), rgba(0, 0, 0, 0.18)),
        url('GITHUB_BACKGROUND.jpeg') center/cover no-repeat;
    }

    .phone-frame {
      width: 100%;
      max-width: 390px;
      min-height: 780px;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      background:
        linear-gradient(rgba(88, 99, 75, 0.72), rgba(88, 99, 75, 0.72)),
        url('GITHUB_BACKGROUND.jpeg') center/cover no-repeat;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.28);
      padding: 42px 24px 30px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .profile-img {
      width: 96px;
      height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 4px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      margin-bottom: 14px;
    }

    .title {
      font-size: 2rem;
      font-weight: 600;
      color: #ffffff;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.92);
      text-align: center;
      margin-bottom: 34px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
      z-index: 2;
    }

    .link-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 54px;
      text-decoration: none;
      background: rgba(255, 255, 255, 0.92);
      color: #232323;
      border-radius: 999px;
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.1px;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.10);
      transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
      padding: 14px 20px;
    }

    .link-btn:hover {
      transform: translateY(-2px);
      background: #ffffff;
      box-shadow: 0 12px 26px rgba(0, 0, 0, 0.14);
    }

    .socials {
      margin-top: 28px;
      display: flex;
      gap: 26px;
      z-index: 2;
    }

    .socials a {
      color: white;
      font-size: 2rem;
      transition: transform 0.2s ease, opacity 0.2s ease;
    }

    .socials a:hover {
      transform: translateY(-2px) scale(1.06);
      opacity: 0.88;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .phone-frame {
        max-width: 100%;
        min-height: 92vh;
        border-radius: 30px;
        padding: 34px 18px 24px;
      }

      .title {
        font-size: 1.8rem;
      }

      .subtitle {
        font-size: 0.95rem;
      }

      .link-btn {
        min-height: 52px;
        font-size: 0.98rem;
      }

      .socials a {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <img src="PROFILE_PICTURE.png" alt="Profile Picture" class="profile-img" />

    <h1 class="title">Keting Store</h1>
    <p class="subtitle">All my important links in one place</p>

    <div class="links">
      <a class="link-btn" href="shopee.html">Shopee Cart</a>
      <a class="link-btn" href="https://www.tiktok.com/@ketinggood?_r=1&_t=ZS-94iI3j9frFt" target="_blank">TikTok</a>
      <a class="link-btn" href="https://carousell.app.link/EAMzm3C2w1b" target="_blank">Carousell</a>
      <a class="link-btn" href="https://www.threads.com/@ketingparkerrr?igshid=NTc4MTIwNjQ2YQ==" target="_blank">Threads</a>
    </div>

    <div class="socials">
      <a href="https://www.tiktok.com/@ketinggood?_r=1&_t=ZS-94iI3j9frFt" target="_blank" aria-label="TikTok"><i class="fa-brands fa-tiktok"></i></a>
      <a href="https://carousell.app.link/EAMzm3C2w1b" target="_blank" aria-label="Carousell"><i class="fa-solid fa-bag-shopping"></i></a>
      <a href="https://www.threads.com/@ketingparkerrr?igshid=NTc4MTIwNjQ2YQ==" target="_blank" aria-label="Threads"><i class="fa-brands fa-threads"></i></a>
    </div>
  </div>
</body>
</html>
