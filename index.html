<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keting Store</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
  />

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 18px;
      background:
        linear-gradient(rgba(0, 0, 0, 0.10), rgba(0, 0, 0, 0.10)),
        url('GITHUB_BACKGROUND.jpeg') center/cover no-repeat;
    }

    .phone-frame {
      width: 100%;
      max-width: 390px;
      min-height: 780px;
      border-radius: 38px;
      overflow: hidden;
      position: relative;
      padding: 34px 22px 28px;
      background:
        linear-gradient(rgba(131, 87, 55, 0.62), rgba(131, 87, 55, 0.62)),
        url('GITHUB_BACKGROUND.jpeg') center/cover no-repeat;
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.22);
      display: flex;
      flex-direction: column;
      align-items: center;
      backdrop-filter: blur(4px);
    }

    .phone-frame::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(rgba(255,255,255,0.06) 0.7px, transparent 0.7px);
      background-size: 14px 14px;
      opacity: 0.15;
    }

    .content {
      position: relative;
      z-index: 2;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100%;
    }

    .profile-img {
      width: 95px;
      height: 95px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 16px;
      border: 4px solid rgba(255,255,255,0.22);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.16);
      background: #fff;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      text-align: center;
      margin-bottom: 8px;
      line-height: 1.15;
    }

    .subtitle {
      font-size: 0.98rem;
      font-weight: 500;
      color: rgba(255,255,255,0.95);
      text-align: center;
      margin-bottom: 24px;
      line-height: 1.55;
      max-width: 310px;
    }

    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .link-btn {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 56px;
      text-decoration: none;
      background: rgba(255,255,255,0.96);
      color: #84654c;
      font-size: 1.02rem;
      font-weight: 600;
      border-radius: 999px;
      letter-spacing: 0.2px;
      box-shadow: 0 10px 22px rgba(0,0,0,0.10);
      transition:
        transform 0.28s ease,
        box-shadow 0.28s ease,
        background 0.28s ease,
        letter-spacing 0.28s ease;
      padding: 14px 18px;
      position: relative;
      overflow: hidden;
    }

    .link-btn::before {
      content: "";
      position: absolute;
      top: 0;
      left: -120%;
      width: 70%;
      height: 100%;
      background: linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,0.65),
        transparent
      );
      transition: left 0.55s ease;
    }

    .link-btn:hover {
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 16px 30px rgba(0,0,0,0.16);
      background: #ffffff;
      letter-spacing: 0.35px;
    }

    .link-btn:hover::before {
      left: 140%;
    }

    .featured-label {
      margin-top: 16px;
      margin-bottom: 10px;
      font-size: 0.92rem;
      font-weight: 600;
      color: rgba(255,255,255,0.96);
      text-align: center;
    }

    .featured-card {
      width: 100%;
      height: 220px;
      background: rgba(255,255,255,0.97);
      border-radius: 24px;
      overflow: hidden;
      text-decoration: none;
      box-shadow: 0 14px 30px rgba(0,0,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      transition: transform 0.30s ease, box-shadow 0.30s ease;
    }

    .featured-card:hover {
      transform: translateY(-5px) scale(1.015);
      box-shadow: 0 20px 38px rgba(0,0,0,0.24);
    }

    .featured-card img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
      border-radius: 16px;
    }

    .socials {
      margin-top: auto;
      padding-top: 26px;
      display: flex;
      justify-content: center;
      gap: 28px;
      width: 100%;
    }

    .socials a {
      color: #ffffff;
      font-size: 2rem;
      text-decoration: none;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .socials a:hover {
      transform: translateY(-3px) scale(1.08);
      opacity: 0.86;
    }

    @media (max-width: 480px) {
      body {
        padding: 10px;
      }

      .phone-frame {
        max-width: 100%;
        min-height: 94vh;
        border-radius: 30px;
        padding: 28px 18px 24px;
      }

      .title {
        font-size: 1.75rem;
      }

      .subtitle {
        font-size: 0.93rem;
      }

      .featured-card {
        height: 205px;
      }

      .socials a {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="phone-frame">
    <div class="content">
      <img src="PROFILE_PICTURE.png" alt="Profile Picture" class="profile-img" />

      <h1 class="title">Keting Store</h1>
      <p class="subtitle">Curated finds, preloved gems, and my favorite picks ✨</p>

      <div class="links">
        <a class="link-btn" href="shopee.html">Shopee Cart</a>
        <a class="link-btn" href="https://www.tiktok.com/@ketinggood?_r=1&_t=ZS-94iI3j9frFt" target="_blank">TikTok</a>
      </div>

      <div class="featured-label">Featured preloved item</div>

      <a class="featured-card" href="https://carousell.app.link/EAMzm3C2w1b" target="_blank">
        <img src="PRELOVED_ITEM.png" alt="Featured preloved item">
      </a>

      <div class="socials">
        <a href="https://www.tiktok.com/@ketinggood?_r=1&_t=ZS-94iI3j9frFt" target="_blank" aria-label="TikTok">
          <i class="fa-brands fa-tiktok"></i>
        </a>

        <a href="shopee.html" aria-label="Shopee Cart">
          <i class="fa-solid fa-bag-shopping"></i>
        </a>

        <a href="https://www.threads.com/@ketingparkerrr?igshid=NTc4MTIwNjQ2YQ==" target="_blank" aria-label="Threads">
          <i class="fa-solid fa-at"></i>
        </a>

        <a href="https://carousell.app.link/EAMzm3C2w1b" target="_blank" aria-label="Carousell">
          <i class="fa-regular fa-heart"></i>
        </a>
      </div>
    </div>
  </div>
</body>
</html>
